<h1 id="inline-comments">Inline Comments</h1>
<p>Paragraph text with trailing comment.</p>
<ul>
<li>First item</li>
<li>Second item</li>
</ul>
<blockquote>
<p>Quoted line</p>
</blockquote>
<ol>
<li>Step one</li>
<li>Step two</li>
</ol>
<p>URL in text: <a href="https://example.com">example</a></p>
<p>Code span with slashes: <code>http://localhost</code></p>
<p>Double slash without space http://example.com stays.</p>
