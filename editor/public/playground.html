<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClearNotation Playground</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cn-bg: #ffffff;
      --cn-fg: #1a1a1a;
      --cn-accent: #2563eb;
      --cn-accent-hover: #1d4ed8;
      --cn-surface: #f9fafb;
      --cn-border: #e5e7eb;
      --cn-muted: #6b7280;
      --cn-code-bg: #f3f4f6;
      --cn-error: #ef4444;
      --cn-radius-sm: 4px;
      --cn-radius-md: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --cn-bg: #111827;
        --cn-fg: #f3f4f6;
        --cn-accent: #60a5fa;
        --cn-accent-hover: #3b82f6;
        --cn-surface: #1f2937;
        --cn-border: #374151;
        --cn-muted: #9ca3af;
        --cn-code-bg: #1f2937;
        --cn-error: #ef4444;
      }
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--cn-bg);
      color: var(--cn-fg);
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 16px;
      border-bottom: 1px solid var(--cn-border);
      background: var(--cn-surface);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--cn-fg);
    }

    header a {
      font-size: 14px;
      color: var(--cn-accent);
      text-decoration: none;
    }

    header a:hover {
      color: var(--cn-accent-hover);
      text-decoration: underline;
    }

    /* Split pane */
    .split {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 32px;
      padding: 0 12px;
      border-bottom: 1px solid var(--cn-border);
      background: var(--cn-surface);
      flex-shrink: 0;
    }

    .pane-header span {
      font-size: 12px;
      font-weight: 500;
      color: var(--cn-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .pane-header .stats {
      font-size: 12px;
      color: var(--cn-muted);
      font-family: monospace;
    }

    .divider {
      width: 1px;
      background: var(--cn-border);
      cursor: col-resize;
      flex-shrink: 0;
      position: relative;
    }

    .divider::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: -3px;
      right: -3px;
    }

    /* Editor textarea */
    #editor {
      flex: 1;
      width: 100%;
      padding: 16px;
      border: none;
      outline: none;
      resize: none;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.6;
      color: var(--cn-fg);
      background: var(--cn-bg);
      tab-size: 2;
    }

    /* Tree output */
    #tree-output {
      flex: 1;
      overflow: auto;
      padding: 16px;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre;
      background: var(--cn-code-bg);
      color: var(--cn-fg);
    }

    #tree-output .error {
      color: var(--cn-error);
      font-weight: 600;
    }

    #tree-output .node-type {
      color: var(--cn-accent);
    }

    #tree-output .anonymous {
      color: var(--cn-muted);
    }

    #tree-output .position {
      color: var(--cn-muted);
      font-size: 11px;
    }

    #tree-output .text-value {
      color: #059669;
    }

    @media (prefers-color-scheme: dark) {
      #tree-output .text-value {
        color: #34d399;
      }
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 24px;
      padding: 0 12px;
      border-top: 1px solid var(--cn-border);
      background: var(--cn-surface);
      font-size: 12px;
      color: var(--cn-muted);
      flex-shrink: 0;
    }

    .status-bar .error-count {
      color: var(--cn-error);
    }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--cn-muted);
      font-size: 14px;
    }

    /* Responsive: stack vertically on narrow screens */
    @media (max-width: 768px) {
      .split {
        flex-direction: column;
      }

      .divider {
        width: auto;
        height: 1px;
        cursor: row-resize;
      }

      .divider::after {
        left: 0;
        right: 0;
        top: -3px;
        bottom: -3px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>ClearNotation Playground</h1>
      <a href="/">Open Editor</a>
    </header>

    <div class="split">
      <div class="pane" id="editor-pane">
        <div class="pane-header">
          <span>Source</span>
        </div>
        <textarea id="editor" spellcheck="false"># ClearNotation Playground

Try editing this document to see the parse tree update live.

## Features

- +{Strong text}
- *{Emphasized text}
- `Inline code`
- [Links -> https://example.com]

::callout[kind="info", title="Tip"]{
This is a callout directive.
}</textarea>
      </div>

      <div class="divider" id="divider"></div>

      <div class="pane" id="tree-pane">
        <div class="pane-header">
          <span>Parse Tree</span>
          <span class="stats" id="parse-time"></span>
        </div>
        <div id="tree-output">
          <div class="loading">Loading tree-sitter...</div>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <span id="status-text">Initializing...</span>
      <span id="node-count"></span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web-tree-sitter@0.26.8/tree-sitter.js"></script>
  <script>
    (function () {
      "use strict";

      const editorEl = document.getElementById("editor");
      const treeOutput = document.getElementById("tree-output");
      const parseTimeEl = document.getElementById("parse-time");
      const statusText = document.getElementById("status-text");
      const nodeCountEl = document.getElementById("node-count");

      let parser = null;
      let currentTree = null;
      let debounceTimer = null;

      // --- Initialization ---

      async function init() {
        try {
          await TreeSitter.init({
            locateFile: () => "https://cdn.jsdelivr.net/npm/web-tree-sitter@0.26.8/tree-sitter.wasm"
          });

          parser = new TreeSitter();
          const lang = await TreeSitter.Language.load("/tree-sitter-clearnotation.wasm");
          parser.setLanguage(lang);

          statusText.textContent = "Ready";
          parse();
        } catch (err) {
          treeOutput.innerHTML = "";
          treeOutput.textContent = "Failed to initialize parser:\n\n" + err.message +
            "\n\nMake sure tree-sitter-clearnotation.wasm is available at /tree-sitter-clearnotation.wasm";
          statusText.textContent = "Error: parser failed to load";
          console.error("Tree-sitter init error:", err);
        }
      }

      // --- Parsing ---

      function parse() {
        if (!parser) return;

        const source = editorEl.value;
        const start = performance.now();
        currentTree = parser.parse(source);
        const elapsed = (performance.now() - start).toFixed(1);

        parseTimeEl.textContent = elapsed + " ms";

        const root = currentTree.rootNode;
        const errorCount = countErrors(root);
        const namedCount = countNamedNodes(root);

        treeOutput.innerHTML = renderTree(root);

        nodeCountEl.textContent = namedCount + " nodes";
        if (errorCount > 0) {
          statusText.innerHTML = '<span class="error-count">' + errorCount +
            " error" + (errorCount !== 1 ? "s" : "") + "</span>";
        } else {
          statusText.textContent = "No errors";
        }
      }

      // --- Tree rendering ---

      function renderTree(node, indent) {
        if (indent === undefined) indent = 0;
        var prefix = "  ".repeat(indent);
        var hasError = node.type === "ERROR" || node.isMissing;
        var isNamed = node.isNamed;

        var line = prefix + "(";

        if (hasError) {
          line = '<span class="error">' + prefix + "(";
        }

        if (isNamed) {
          line += '<span class="node-type">' + escapeHtml(node.type) + "</span>";
        } else {
          line += '<span class="anonymous">' + escapeHtml(node.type) + "</span>";
        }

        if (node.namedChildCount === 0 && node.text && node.text.length < 50 && node.text.length > 0) {
          line += ' <span class="text-value">"' + escapeHtml(node.text) + '"</span>';
        }

        line += ' <span class="position">[' +
          node.startPosition.row + ":" + node.startPosition.column + "]</span>";

        line += ")";

        if (hasError) {
          line += "</span>";
        }

        line += "\n";

        for (var i = 0; i < node.namedChildCount; i++) {
          line += renderTree(node.namedChild(i), indent + 1);
        }

        return line;
      }

      function countErrors(node) {
        var count = 0;
        if (node.type === "ERROR" || node.isMissing) count++;
        for (var i = 0; i < node.namedChildCount; i++) {
          count += countErrors(node.namedChild(i));
        }
        return count;
      }

      function countNamedNodes(node) {
        var count = 1;
        for (var i = 0; i < node.namedChildCount; i++) {
          count += countNamedNodes(node.namedChild(i));
        }
        return count;
      }

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // --- Debounced input ---

      editorEl.addEventListener("input", function () {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(parse, 200);
      });

      // --- Resizable divider ---

      (function initDivider() {
        var divider = document.getElementById("divider");
        var editorPane = document.getElementById("editor-pane");
        var treePane = document.getElementById("tree-pane");
        var dragging = false;

        divider.addEventListener("mousedown", function (e) {
          e.preventDefault();
          dragging = true;
          document.body.style.cursor = "col-resize";
          document.body.style.userSelect = "none";
        });

        document.addEventListener("mousemove", function (e) {
          if (!dragging) return;
          var container = editorPane.parentElement;
          var rect = container.getBoundingClientRect();
          var isVertical = window.innerWidth <= 768;

          if (isVertical) {
            var ratio = (e.clientY - rect.top) / rect.height;
            ratio = Math.max(0.2, Math.min(0.8, ratio));
            editorPane.style.flex = ratio + "";
            treePane.style.flex = (1 - ratio) + "";
          } else {
            var ratio = (e.clientX - rect.left) / rect.width;
            ratio = Math.max(0.2, Math.min(0.8, ratio));
            editorPane.style.flex = ratio + "";
            treePane.style.flex = (1 - ratio) + "";
          }
        });

        document.addEventListener("mouseup", function () {
          if (dragging) {
            dragging = false;
            document.body.style.cursor = "";
            document.body.style.userSelect = "";
          }
        });
      })();

      // --- Start ---
      init();
    })();
  </script>
</body>
</html>
